
# spring.sql.init.data-locations=classpath:db/data/data-dev.sql 
# spring.jpa.defer-datasource-initialization=true

app:
  cors:
    allowed-origins:
      - http://localhost:4200
      - https://myapp.com
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
    max-age: 3600


server:
  port: 8080


spring:
  application:
    name: bookmark-web-api

  sql:
    init:
      mode: always
      data-locations: classpath:db/data-dev.sql 

  h2:
    console:
      enabled: true

  datasource:
    url: jdbc:h2:mem:mydb
    username: sa
    password: password
    driverClassName: org.h2.Driver

  jpa:
    defer-datasource-initialization: true 
    database-platform: org.hibernate.dialect.H2Dialect      
    hibernate:
      ddl-auto: create
